<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
<div class="container">
    <div class="row">
        <div class="col col-lg-6 mx-auto">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5>Login Page</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-group p-2">
                            <label class="small fw-bold">Email <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control form-control-sm" placeholder="Enter Email...">
                        </div>
                        <div class="form-group p-2">
                            <label class="small fw-bold">Password <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" placeholder="Enter Password...">
                        </div>
                        <div class="form-group text-center mt-3">
                            <button class="btn btn-sm btn-info w-100">SignIn</button>
                        </div>
                        <div class="form-group">
                            <a routerLink="/forgetpassword">Forget Password</a>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
