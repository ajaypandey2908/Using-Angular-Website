<div class="container">
    <div class="row">
        <div class="col col-6 mx-auto">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h6>Forget Password Login Page</h6>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-group p-2">
                            <label class="small">First Name</label>
                            <input type="text" class="form-control form-control-sm" placeholder="Enter First Name...">
                        </div>
                        <div class="form-group p-2">
                            <label class="small">Last Name</label>
                            <input type="text" class="form-control form-control-sm" placeholder="Enter Last Name...">
                        </div>
                        <div class="form-group p-2">
                            <label class="small">Email <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" placeholder="Enter Email...">
                        </div>
                        <div class="form-group p-2">
                            <label class="small">Password <span class="text-danger">*</span></label>
                            <input type="text" class="form-control form-control-sm" placeholder="Enter Password...">
                        </div>
                        <div class="form-group mt-3 text-center">
                            <button class="btn btn-sm btn-success w-100">LogIn</button>
                        </div>
                    </form>
                </div>
                
            </div>

        </div>
        
    </div>

</div>
